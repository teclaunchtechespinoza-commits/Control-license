name: Backend CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:6
        ports: ["27017:27017"]
        # healthcheck para evitar "sleep" arbitrário
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping || exit 1"
          --health-interval 5s --health-timeout 3s --health-retries 5

    env:
      MONGODB_URI: mongodb://localhost:27017/licenser_test
      TENANT_DB_PREFIX: licenser_
      SEED_DEMO: "false"
      JWT_SECRET: test-secret-change-me
      JWT_ALG: HS256
      TZ: America/Recife

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx asgi-lifespan pymongo

      - name: Wait for services (mongo/redis)
        run: |
          for i in {1..30}; do
            nc -z localhost 27017 && nc -z localhost 6379 && break
            sleep 1
          done

      - name: Run tests
        run: pytest -q tests
